<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Thông tin bệnh</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#f5f7fb;
    }

    .hero{
      color:white;
      padding:60px 20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    .logo{
      width:110px;
      height:110px;

      background:white;

      border-radius:50%;

      padding:10px;

      display:flex;
      align-items:center;
      justify-content:center;

      margin-bottom:20px;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .card{
      background:white;
      padding:24px;
      border-radius:16px;
      margin-top:20px;
    }

    ul{
      padding-left:20px;
    }

    li{
      margin-bottom:10px;
    }

  </style>

</head>

<body>

  <section
    class="hero"
    id="hero"
  >

    <div class="container">

      <div class="logo">
        <img src="./logo-bv-new.png">
      </div>

      <h1 id="title">
        Đang tải...
      </h1>

      <p id="desc"></p>

    </div>

  </section>

  <div class="container">

    <div class="card">

      <h2>Tổng quan</h2>

      <p id="overview"></p>

    </div>

    <div class="card">

      <h2>Triệu chứng</h2>

      <ul id="symptoms"></ul>

    </div>

    <div class="card">

      <h2>Xử trí khẩn cấp</h2>

      <ul id="emergency"></ul>

    </div>

    <div class="card">

      <h2>Phòng ngừa</h2>

      <ul id="prevention"></ul>

    </div>

  </div>

  <script src="./data.js"></script>

  <script>

    const params =
      new URLSearchParams(window.location.search);

    const id =
      params.get("id");

    const disease =
      diseases.find(x => x.id === id);

    if(!disease){

      alert("Không tìm thấy dữ liệu");

      throw new Error("Disease not found");
    }

    document.title =
      disease.title;

    document
      .getElementById("title")
      .innerText =
      disease.title;

    document
      .getElementById("desc")
      .innerText =
      disease.shortDesc;

    document
      .getElementById("overview")
      .innerText =
      disease.overview;

    document
      .getElementById("hero")
      .style.background =
      disease.color;

    disease.symptoms.forEach(item => {

      document
        .getElementById("symptoms")
        .innerHTML +=
        `<li>${item}</li>`;

    });

    disease.emergency.forEach(item => {

      document
        .getElementById("emergency")
        .innerHTML +=
        `<li>${item}</li>`;

    });

    disease.prevention.forEach(item => {

      document
        .getElementById("prevention")
        .innerHTML +=
        `<li>${item}</li>`;

    });

  </script>

</body>
</html>
