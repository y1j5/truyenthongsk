<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Thông tin bệnh</title>

  <meta
    name="description"
    content="Thông tin sức khỏe cộng đồng"
    id="meta-desc"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f4f7fb;
      color:#222;
      line-height:1.7;
    }

    a{
      text-decoration:none;
    }

    .hero{
      color:white;
      padding:60px 20px;
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      background:rgba(255,255,255,0.08);
      border-radius:50%;
      top:-250px;
      right:-180px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      position:relative;
      z-index:2;
    }

    .logo-wrap{
      width:120px;
      height:120px;

      background:white;

      border-radius:50%;

      display:flex;
      align-items:center;
      justify-content:center;

      padding:12px;

      margin-bottom:24px;

      box-shadow:
        0 8px 20px rgba(0,0,0,0.18);
    }

    .logo-wrap img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .category{
      display:inline-block;

      background:rgba(255,255,255,0.18);

      padding:8px 16px;

      border-radius:999px;

      margin-bottom:20px;

      font-size:14px;
    }

    h1{
      font-size:48px;
      margin-bottom:20px;
    }

    .short-desc{
      max-width:720px;
      font-size:19px;
      opacity:0.96;
    }

    .content{
      padding:40px 20px;
    }

    .grid{
      display:grid;
      grid-template-columns:
        repeat(auto-fit,minmax(280px,1fr));

      gap:24px;
    }

    .card{
      background:white;

      border-radius:18px;

      padding:28px;

      box-shadow:
        0 6px 22px rgba(0,0,0,0.06);
    }

    .card h2{
      margin-bottom:20px;
      font-size:24px;
    }

    ul{
      padding-left:20px;
    }

    li{
      margin-bottom:12px;
    }

    .overview{
      margin-bottom:28px;
      font-size:17px;
    }

    .warning{
      background:#fff4e5;

      border-left:6px solid #ff9800;

      padding:20px;

      border-radius:12px;

      margin-top:24px;
    }

    .updated{
      margin-top:18px;
      color:#777;
      font-size:14px;
    }

    .hero-image{
      width:100%;
      max-width:450px;

      border-radius:22px;

      margin-top:32px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.18);
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;

      margin-top:24px;

      background:white;

      color:#222;

      padding:12px 18px;

      border-radius:12px;

      font-weight:bold;
    }

    footer{
      padding:40px 20px;
      text-align:center;
      color:#777;
      font-size:14px;
    }

    @media(max-width:768px){

      h1{
        font-size:34px;
      }

      .short-desc{
        font-size:16px;
      }

      .hero{
        padding:40px 20px;
      }

      .logo-wrap{
        width:100px;
        height:100px;
      }

    }

  </style>

</head>

<body>

  <section
    class="hero"
    id="hero"
  >

    <div class="container">

      <div class="logo-wrap">
        <img
          src="./logo-bv-new.png"
          alt="Logo bệnh viện"
        />
      </div>

      <div
        class="category"
        id="category"
      ></div>

      <h1 id="title">
        Đang tải...
      </h1>

      <p
        class="short-desc"
        id="shortDesc"
      ></p>

      <img
        class="hero-image"
        id="heroImage"
        src=""
        alt=""
      />

      <br>

      <a
        href="./index.html"
        class="back-btn"
      >
        ← Quay lại trang chủ
      </a>

    </div>

  </section>

  <section class="content">

    <div class="container">

      <div
        class="card overview"
        id="overview"
      ></div>

      <div class="grid">

        <div class="card">

          <h2>
            Triệu chứng
          </h2>

          <ul id="symptoms"></ul>

        </div>

        <div class="card">

          <h2>
            Xử trí khẩn cấp
          </h2>

          <ul id="emergency"></ul>

        </div>

        <div class="card">

          <h2>
            Phòng ngừa
          </h2>

          <ul id="prevention"></ul>

        </div>

      </div>

      <div
        class="warning"
        id="warning"
      ></div>

      <div
        class="updated"
        id="updated"
      ></div>

    </div>

  </section>

  <footer>
    © 2026 - Thông tin sức khỏe cộng đồng
  </footer>

  <script src="./data.js"></script>

  <script>

    const params =
      new URLSearchParams(window.location.search);

    const id =
      params.get("id");

    const disease =
      diseases.find(item => item.id === id);

    if(!disease){

      document.body.innerHTML = `

        <div style="
          padding:80px 20px;
          text-align:center;
          font-family:Arial;
        ">

          <h1>
            Không tìm thấy dữ liệu
          </h1>

          <p style="margin-top:12px;">
            Bệnh không tồn tại hoặc đã bị xóa.
          </p>

          <a
            href="./index.html"
            style="
              display:inline-block;
              margin-top:24px;
              background:#1976d2;
              color:white;
              padding:12px 18px;
              border-radius:10px;
            "
          >
            Quay lại trang chủ
          </a>

        </div>

      `;

      throw new Error("Disease not found");
    }

    document.title =
      disease.title;

    document
      .getElementById("meta-desc")
      .setAttribute(
        "content",
        disease.shortDesc
      );

    document
      .getElementById("title")
      .innerText =
      disease.title;

    document
      .getElementById("category")
      .innerText =
      disease.category;

    document
      .getElementById("shortDesc")
      .innerText =
      disease.shortDesc;

    document
      .getElementById("overview")
      .innerHTML = `

        <h2>
          Tổng quan
        </h2>

        <p>
          ${disease.overview}
        </p>

      `;

    document
      .getElementById("warning")
      .innerHTML = `

        <strong>
          Lưu ý:
        </strong>

        ${disease.warning}

      `;

    document
      .getElementById("updated")
      .innerText =
      "Cập nhật: " + disease.updatedAt;

    document
      .getElementById("hero")
      .style.background =
      `linear-gradient(
        135deg,
        ${disease.color},
        #ffffff22
      )`;

    const heroImage =
      document.getElementById("heroImage");

    heroImage.src =
      disease.image;

    heroImage.alt =
      disease.title;

    disease.symptoms.forEach(item => {

      document
        .getElementById("symptoms")
        .innerHTML += `

          <li>${item}</li>

        `;

    });

    disease.emergency.forEach(item => {

      document
        .getElementById("emergency")
        .innerHTML += `

          <li>${item}</li>

        `;

    });

    disease.prevention.forEach(item => {

      document
        .getElementById("prevention")
        .innerHTML += `

          <li>${item}</li>

        `;

    });

  </script>

</body>
</html>
